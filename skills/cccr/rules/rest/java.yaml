  # Feign : interfaces déclaratives (@FeignClient) dont les méthodes portent
  # les mêmes annotations que des routes Spring MVC, mais sont des sites
  # d'appel (pas de corps de méthode : signature suivie de `;`).
  - id: cccr.rest.java.feign-get
    languages: [java]
    severity: INFO
    message: Appel REST client (Feign, GET).
    metadata:
      category: endpoint-inventory
      role: call
      http_method: GET
      framework: feign
    patterns:
      - pattern-inside: |
          @FeignClient(...)
          interface $IFACE {
            ...
          }
      - pattern-either:
          - pattern: |
              @GetMapping(...)
              $RET $METHOD(...);
          - pattern: |
              @RequestMapping(..., method = RequestMethod.GET, ...)
              $RET $METHOD(...);

