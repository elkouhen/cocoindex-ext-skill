rules:
  - id: cccr.rest.java.serve-get
    languages: [java]
    severity: INFO
    message: Route REST exposée (GET).
    metadata:
      category: endpoint-inventory
      role: serve
      http_method: GET
      framework: spring
    patterns:
      - pattern-either:
          - pattern: |
              @GetMapping(...)
              $RET $METHOD(...) { ... }
          - pattern: |
              @RequestMapping(..., method = RequestMethod.GET, ...)
              $RET $METHOD(...) { ... }

  - id: cccr.rest.java.serve-post
