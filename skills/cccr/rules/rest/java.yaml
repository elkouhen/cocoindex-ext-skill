  # WebClient : builder fluent (Spring WebFlux), une méthode HTTP par
  # entrée de chaîne (`.get()`, `.post()`, ...) suivie de `.uri(...)`.
  - id: cccr.rest.java.webclient-get
    languages: [java]
    severity: INFO
    message: Appel REST client (WebClient, GET).
    metadata:
      category: endpoint-inventory
      role: call
      http_method: GET
      framework: webclient
    patterns:
      - pattern: $WC.get().uri(...)

