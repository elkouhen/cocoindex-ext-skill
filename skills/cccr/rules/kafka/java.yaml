rules:
  - id: cccr.kafka.java.consume
    languages: [java]
    severity: INFO
    message: Consommation Kafka (@KafkaListener).
    metadata:
      category: endpoint-inventory
      system: kafka
      role: consume
      framework: spring-kafka
    patterns:
      - pattern: |
          @KafkaListener(...)
          $RET $METHOD(...) { ... }

  - id: cccr.kafka.java.produce-template
    languages: [java]
    severity: INFO
    message: Production Kafka (KafkaTemplate).
    metadata:
      category: endpoint-inventory
      system: kafka
      role: produce
      framework: spring-kafka
    patterns:
      - pattern-either:
          # au moins topic + 1 argument : exclut send(ProducerRecord) à un
          # seul argument, où le topic est déjà porté par produce-record.
          - pattern: $KAFKA.send($TOPIC, $VAL, ...)
          - pattern: $KAFKA.sendDefault(...)  # topic implicite (config du template), toujours dynamique

  - id: cccr.kafka.java.produce-record
    languages: [java]
    severity: INFO
    message: Production Kafka (ProducerRecord).
    metadata:
      category: endpoint-inventory
      system: kafka
      role: produce
      framework: kafka-clients
    patterns:
      - pattern-either:
          - pattern: new ProducerRecord($TOPIC, $KEY, $VAL)
          - pattern: new ProducerRecord($TOPIC, $VAL)

  # API bas niveau (confluent-kafka / kafka-clients, hors Spring) :
  # KafkaConsumer.subscribe(...) — restreint aux formes de collection
  # usuelles pour éviter tout faux positif avec un .subscribe(...) non-Kafka
  # (RxJava/Reactor prennent un lambda/Observer, jamais une Collection<String>
  # construite par ces trois helpers).
  - id: cccr.kafka.java.consume-raw
    languages: [java]
    severity: INFO
    message: Consommation Kafka (API bas niveau, KafkaConsumer.subscribe).
    metadata:
      category: endpoint-inventory
      system: kafka
      role: consume
      framework: kafka-clients
    patterns:
      - pattern-either:
          - pattern: $CONSUMER.subscribe(Collections.singletonList(...))
          - pattern: $CONSUMER.subscribe(Arrays.asList(...))
          - pattern: $CONSUMER.subscribe(List.of(...))

  # Kafka Streams DSL (BACKLOG Q25, ccc-radar) : second style
  # d'intégration Kafka, distinct de l'idiome impératif
  # @KafkaListener/KafkaTemplate.send ci-dessus (`@EnableKafkaStreams`,
  # `StreamsBuilder`). Volontairement restreint aux formes portant un
  # marqueur Kafka Streams sans ambiguïté (`Consumed.with(...)`, ou nichée
  # dans un `.join(...)`) — un bare `$X.stream($TOPIC)` collisionnerait avec
  # `Arrays.stream(x)`/`Collection.stream()`, même logique que consume-raw
  # ci-dessus (restreint pour éviter les faux positifs RxJava/Reactor).
  - id: cccr.kafka.java.streams-consume
    languages: [java]
    severity: INFO
    message: Consommation Kafka (Kafka Streams, StreamsBuilder.stream).
    metadata:
      category: endpoint-inventory
      system: kafka
      role: consume
      framework: kafka-streams
    patterns:
      - pattern-either:
          - pattern: $BUILDER.stream($TOPIC, Consumed.with(...))
          - pattern: |
              $STREAM.join($BUILDER.stream($TOPIC), ...)
          - pattern: |
              $STREAM.join($OTHER, $BUILDER.stream($TOPIC), ...)

  # Marqueur `Produced.with(...)`, ou `.peek(...).to(...)` (forme observée
  # dans les exemples réels) — un `.to(...)` isolé sans l'un de ces deux
  # marqueurs n'est volontairement pas capté (collision possible avec
  # Reactor `Mono/Flux.to(...)`, des mappers `.to(Class)`, etc.).
  - id: cccr.kafka.java.streams-produce
    languages: [java]
    severity: INFO
    message: Production Kafka (Kafka Streams, KStream.to).
    metadata:
      category: endpoint-inventory
      system: kafka
      role: produce
      framework: kafka-streams
    patterns:
      - pattern-either:
          - pattern: $STREAM.to($TOPIC, Produced.with(...))
          - pattern: |
              $STREAM.peek(...).to($TOPIC)
