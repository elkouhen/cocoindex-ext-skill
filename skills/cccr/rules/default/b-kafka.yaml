rules:
  # --- R5 : claim check, jamais de payload fichier dans Kafka ---

  - id: r5-contenu-fichier-dans-evenement-kafka
    languages: [java]
    severity: ERROR
    message: >
      R5 — un contenu de fichier (bytes/payload) semble être envoyé
      directement dans un message Kafka. Un événement ne doit porter que des
      identifiants métier, une référence vers l'emplacement où le fichier
      est stocké (clé/identifiant), un sha256, une taille et un format —
      jamais le contenu (claim check).
    metadata:
      regle: R5
      reference: design-rules.md#r5
    patterns:
      - pattern-either:
          - pattern: new ProducerRecord($TOPIC, $KEY, $VAL)
          - pattern: new ProducerRecord($TOPIC, $VAL)
          - pattern: $KAFKA.send($TOPIC, $VAL)
          - pattern: $KAFKA.send($TOPIC, $KEY, $VAL)
      - metavariable-regex:
          metavariable: $VAL
          regex: (?i).*(filecontent|filebytes|payloadbytes|piecebytes|attachmentbytes)$

  - id: r5-limite-taille-message-augmentee
    languages: [java]
    severity: WARNING
    message: >
      R5 — augmentation de la taille max des messages Kafka
      (max.request.size / message.max.bytes / fetch.max.bytes). Signal fort
      qu'un payload fichier transite par Kafka au lieu du claim check : la
      taille applicative max d'un événement est de 256 Ko (marge sous la
      limite broker de 1 Mo). Si la limite doit monter, c'est le design de
      l'événement qu'il faut corriger (une référence vers le fichier, pas
      son contenu).
    metadata:
      regle: R5
      reference: design-rules.md#r5
    pattern-either:
      - pattern: $PROPS.put(ProducerConfig.MAX_REQUEST_SIZE_CONFIG, $V)
      - pattern: $PROPS.put("max.request.size", $V)
      - pattern: $PROPS.setProperty("max.request.size", $V)
      - pattern: $PROPS.put("message.max.bytes", $V)
      - pattern: $PROPS.setProperty("message.max.bytes", $V)
      - pattern: $PROPS.put("max.partition.fetch.bytes", $V)
      - pattern: $PROPS.put("fetch.max.bytes", $V)

  # --- R6 : partitionnement par clé métier, ordre garanti par entité ---

  - id: r6-envoi-kafka-sans-cle-de-partition
    languages: [java]
    severity: WARNING
    message: >
      R6 — envoi Kafka sans clé de partition : la répartition se fait en
      round-robin/sticky et l'ordre des événements d'une même entité n'est
      plus garanti. Sur les topics métier, partitionner par clé (un
      identifiant métier stable, ou une clé de lot selon le topic). Une
      absence de clé n'est acceptable que si aucun consommateur ne dépend de
      l'ordre.
    metadata:
      regle: R6
      reference: design-rules.md#r6
    pattern-either:
      - pattern: new ProducerRecord($TOPIC, $VAL)
      - patterns:
          - pattern-either:
              - pattern: $KT.send($TOPIC, $VAL)
              - pattern: $KT.sendDefault($VAL)
          - metavariable-regex:
              metavariable: $KT
              regex: (?i).*(kafka|producer|template).*

  # --- R7 : at-least-once + idempotence, pas d'exactly-once magique ---

  - id: r7-producer-acks-non-all
    languages: [java]
    severity: ERROR
    message: >
      R7 — configuration producteur Kafka avec acks différent de "all". Sans
      acks=all, une confirmation de leader seul n'assure pas la durabilité
      requise pour de l'at-least-once fiable.
    metadata:
      regle: R7
      reference: design-rules.md#r7
    patterns:
      - pattern-either:
          - pattern: $PROPS.put(ProducerConfig.ACKS_CONFIG, "0")
          - pattern: $PROPS.put(ProducerConfig.ACKS_CONFIG, "1")
          - pattern: $PROPS.put("acks", "0")
          - pattern: $PROPS.put("acks", "1")
          - pattern: $PROPS.setProperty("acks", "0")
          - pattern: $PROPS.setProperty("acks", "1")

  - id: r7-producer-idempotence-desactivee
    languages: [java]
    severity: ERROR
    message: >
      R7 — l'idempotence producteur Kafka est explicitement désactivée.
      enable.idempotence doit être à true pour éviter les doublons en cas de
      retry producteur.
    metadata:
      regle: R7
      reference: design-rules.md#r7
    patterns:
      - pattern-either:
          - pattern: $PROPS.put(ProducerConfig.ENABLE_IDEMPOTENCE_CONFIG, false)
          - pattern: $PROPS.put("enable.idempotence", false)
          - pattern: $PROPS.put("enable.idempotence", "false")
          - pattern: $PROPS.setProperty("enable.idempotence", "false")

  - id: r7-auto-commit-consommateur
    languages: [java]
    severity: WARNING
    message: >
      R7 — enable.auto.commit=true sur un consommateur Kafka : l'offset est
      committé par intervalle de temps, potentiellement avant la fin du
      traitement — perte de messages possible au rebalance/crash. Committer
      après traitement (commit manuel ou ack-mode du framework), handler
      rejouable + déduplication par clé métier.
    metadata:
      regle: R7
      reference: design-rules.md#r7
    pattern-either:
      - pattern: $PROPS.put(ConsumerConfig.ENABLE_AUTO_COMMIT_CONFIG, true)
      - pattern: $PROPS.put(ConsumerConfig.ENABLE_AUTO_COMMIT_CONFIG, "true")
      - pattern: $PROPS.put("enable.auto.commit", true)
      - pattern: $PROPS.put("enable.auto.commit", "true")
      - pattern: $PROPS.setProperty("enable.auto.commit", "true")

  # --- R8 : outbox pattern pour toute écriture DB + événement ---

  - id: r8-double-ecriture-db-puis-kafka
    languages: [java]
    severity: WARNING
    message: >
      R8 — écriture DB (save/persist) suivie d'un envoi Kafka direct dans la
      même méthode, hors transaction commune. La double écriture directe
      DB puis Kafka est interdite : passer par un outbox (table outbox dans
      la même transaction PostgreSQL, relais Debezium/poller vers Kafka).
    metadata:
      regle: R8
      reference: design-rules.md#r8
    patterns:
      - pattern-either:
          - pattern: |
              $REPO.save(...);
              ...
              $KAFKA.send(...);
          - pattern: |
              $REPO.saveAndFlush(...);
              ...
              $KAFKA.send(...);
          - pattern: |
              $EM.persist(...);
              ...
              $KAFKA.send(...);

  # --- R10 : DLQ et rejeu systématiques ---

  - id: r10-listener-avale-exception-sans-dlq
    languages: [java]
    severity: WARNING
    message: >
      R10 — un @KafkaListener capture une exception sans la relancer et sans
      action de rejeu/DLQ visible (bloc catch vide ou simple log). Un handler
      doit être rejouable : erreurs transitoires en retry in-process avec
      backoff, puis DLQ — jamais un retry infini bloquant la partition, ni un
      avalage silencieux de l'erreur.
    metadata:
      regle: R10
      reference: design-rules.md#r10
    patterns:
      - pattern-inside: |
          @KafkaListener(...)
          $RET $METHOD(...) {
            ...
          }
      - pattern-either:
          - pattern: try { ... } catch ($EX $E) { }
          - pattern: |
              try { ... } catch ($EX $E) {
                $LOG.error(...);
              }
