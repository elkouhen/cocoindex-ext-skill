rules:
  # --- R1 : aucun fichier chargé entièrement en mémoire ---

  - id: r1-read-all-bytes
    languages: [java]
    severity: ERROR
    message: >
      R1 — lecture intégrale d'un flux en mémoire interdite sur un flux de
      fichier (document, pièce jointe, archive). Utiliser un traitement par
      flux (InputStream -> traitement -> OutputStream) avec des buffers
      bornés (8-64 Ko).
    metadata:
      regle: R1
      reference: design-rules.md#r1
    patterns:
      - pattern-either:
          - pattern: $STREAM.readAllBytes()
          - pattern: $STREAM.readAllBytes($N)
          - pattern: java.nio.file.Files.readAllBytes(...)
          - pattern: org.apache.commons.io.IOUtils.toByteArray(...)
          - pattern: com.google.common.io.ByteStreams.toByteArray(...)

  - id: r1-bytearrayoutputstream-accumulation
    languages: [java]
    severity: WARNING
    message: >
      R1 — un ByteArrayOutputStream qui accumule la copie d'un flux entier
      reconstitue le fichier en mémoire. Vérifier qu'il ne sert pas à
      bufferiser un fichier/pièce jointe entier ; sinon écrire directement
      vers un OutputStream borné (fichier temporaire).
    metadata:
      regle: R1
      reference: design-rules.md#r1
    patterns:
      - pattern: new ByteArrayOutputStream(...)
      - pattern-not-inside: |
          $BAOS = new ByteArrayOutputStream(...);
          ...
          $BAOS.reset();

  - id: r1-new-string-depuis-bytes-fichier
    languages: [java]
    severity: ERROR
    message: >
      R1 — construction d'une String à partir d'un tableau d'octets
      représentant un document entier (XML/fichier). Utiliser un parsing en
      flux (StAX/SAX) au lieu de matérialiser le document en mémoire.
    metadata:
      regle: R1
      reference: design-rules.md#r1
    patterns:
      - pattern-either:
          - pattern: new String($BYTES)
          - pattern: new String($BYTES, $CHARSET)
      - metavariable-regex:
          metavariable: $BYTES
          regex: (?i).*(content|bytes|payload|xml|file|fichier|document|pdf).*

  - id: r1-dom-parsing-flux-entrant
    languages: [java]
    severity: ERROR
    message: >
      R1 — le parsing DOM (DocumentBuilder) charge tout le document XML en
      mémoire. Utiliser StAX (XMLStreamReader) ou SAX pour la validation et
      l'extraction sur un flux entrant non borné.
    metadata:
      regle: R1
      reference: design-rules.md#r1
    patterns:
      - pattern-either:
          - pattern: $DBF.newDocumentBuilder().parse(...)
          - pattern: |
              $DB = $DBF.newDocumentBuilder();
              ...
              $DB.parse(...);

  - id: r1-jaxb-unmarshal-a-verifier
    languages: [java]
    severity: INFO
    message: >
      R1 — unmarshalling JAXB détecté. Acceptable uniquement sur un
      sous-arbre borné extrait au préalable via StAX (ex. un élément métier
      unitaire) ; jamais directement sur le document racine d'un flux
      entrant. Vérifier manuellement la source ($STREAM_OU_SOURCE).
    metadata:
      regle: R1
      reference: design-rules.md#r1
    pattern-either:
      - pattern: $U.unmarshal($STREAM_OU_SOURCE)

  - id: r1-lecture-integrale-texte
    languages: [java]
    severity: ERROR
    message: >
      R1 — lecture intégrale d'un fichier/flux sous forme de String ou de
      byte[] (readString, readAllLines, IOUtils.toString, copyToByteArray...).
      Même interdit que readAllBytes : traiter par flux (Reader/InputStream)
      avec des buffers bornés, parser le XML en StAX/SAX.
    metadata:
      regle: R1
      reference: design-rules.md#r1
    pattern-either:
      - pattern: java.nio.file.Files.readString(...)
      - pattern: java.nio.file.Files.readAllLines(...)
      - pattern: org.apache.commons.io.IOUtils.toString(...)
      - pattern: org.apache.commons.io.FileUtils.readFileToByteArray(...)
      - pattern: org.apache.commons.io.FileUtils.readFileToString(...)
      - pattern: com.google.common.io.CharStreams.toString(...)
      - pattern: org.springframework.util.StreamUtils.copyToByteArray(...)
      - pattern: org.springframework.util.StreamUtils.copyToString(...)
      - pattern: org.springframework.util.FileCopyUtils.copyToByteArray(...)
      - pattern: org.springframework.util.FileCopyUtils.copyToString(...)

  # --- R2 : upload/download en streaming pur ---

  - id: r2-corps-requete-byte-array
    languages: [java]
    severity: WARNING
    message: >
      R2 — corps de requête HTTP reçu en byte[]/String via @RequestBody : le
      framework matérialise le corps entier en heap avant d'appeler la
      méthode. Pour un upload de fichier, consommer le flux au fil de l'eau
      (multipart streaming, InputStream de la requête) et l'écrire
      directement vers sa destination finale.
    metadata:
      regle: R2
      reference: design-rules.md#r2
    pattern-either:
      - pattern: $RET $METHOD(..., @RequestBody byte[] $CORPS, ...) { ... }
      - pattern: $RET $METHOD(..., @org.springframework.web.bind.annotation.RequestBody byte[] $CORPS, ...) { ... }

  - id: r2-download-byte-array-en-reponse
    languages: [java]
    severity: WARNING
    message: >
      R2 — réponse HTTP construite sur un byte[] complet
      (ResponseEntity<byte[]>) : le fichier entier transite par la heap à
      chaque téléchargement. Restituer en streaming
      (InputStreamResource/StreamingResponseBody proxy source -> client) ou
      via URL présignée si la destination le permet.
    metadata:
      regle: R2
      reference: design-rules.md#r2
    pattern-either:
      - pattern: ResponseEntity<byte[]> $METHOD(...) { ... }
      - pattern: org.springframework.http.ResponseEntity<byte[]> $METHOD(...) { ... }

  - id: r2-multipart-getbytes-buffer-complet
    languages: [java]
    severity: WARNING
    message: >
      R2 — getBytes() sur un fichier/multipart matérialise le corps de
      requête entier en heap. Consommer le flux au fil de l'eau et l'écrire
      directement vers sa destination finale.
    metadata:
      regle: R2
      reference: design-rules.md#r2
    patterns:
      - pattern: $MF.getBytes()
      - metavariable-regex:
          metavariable: $MF
          regex: (?i).*(file|multipart|upload|piece|attachment|pj).*

  # --- R3 : bornes explicites partout ---

  - id: r3-findall-sans-pagination
    languages: [java]
    severity: WARNING
    message: >
      R3 — findAll() sans pagination peut charger une collection non bornée
      depuis la DB. Utiliser une Pageable/pagination explicite.
    metadata:
      regle: R3
      reference: design-rules.md#r3
    patterns:
      - pattern: $REPO.findAll()
      - pattern-not: $REPO.findAll($PAGEABLE)

  - id: r3-documentbuilderfactory-sans-protection-xxe
    languages: [java]
    severity: ERROR
    message: >
      R3 — DocumentBuilderFactory utilisé sans désactiver le DOCTYPE
      (protection XXE / "billion laughs"). Désactiver le DTD
      (setFeature("http://apache.org/xml/features/disallow-doctype-decl",
      true)) avant de construire le DocumentBuilder.
    metadata:
      regle: R3
      reference: design-rules.md#r3
      cwe: CWE-611
    patterns:
      - pattern: $DBF.newDocumentBuilder(...)
      - pattern-not-inside: |
          $DBF.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);
          ...
          $DBF.newDocumentBuilder(...);

  - id: r3-xmlinputfactory-sans-protection-xxe
    languages: [java]
    severity: ERROR
    message: >
      R3 — XMLInputFactory (StAX) utilisé sans désactiver le support DTD.
      Configurer XMLInputFactory.SUPPORT_DTD à false (et activer
      SECURE_PROCESSING) avant de créer le XMLStreamReader, pour se protéger
      des attaques XXE et "billion laughs".
    metadata:
      regle: R3
      reference: design-rules.md#r3
      cwe: CWE-611
    patterns:
      - pattern-either:
          - pattern: $XIF.createXMLStreamReader(...)
          - pattern: $XIF.createXMLEventReader(...)
      - pattern-not-inside: |
          $XIF.setProperty(javax.xml.stream.XMLInputFactory.SUPPORT_DTD, false);
          ...
          $XIF.createXMLStreamReader(...);
      - pattern-not-inside: |
          $XIF.setProperty(javax.xml.stream.XMLInputFactory.SUPPORT_DTD, false);
          ...
          $XIF.createXMLEventReader(...);

  - id: r3-saxparserfactory-sans-protection-xxe
    languages: [java]
    severity: ERROR
    message: >
      R3 — SAXParserFactory utilisé sans désactiver le DOCTYPE (protection
      XXE / "billion laughs"). Désactiver le DTD
      (setFeature("http://apache.org/xml/features/disallow-doctype-decl",
      true)) avant de créer le SAXParser.
    metadata:
      regle: R3
      reference: design-rules.md#r3
      cwe: CWE-611
    patterns:
      - pattern: $SPF.newSAXParser(...)
      - pattern-not-inside: |
          $SPF.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);
          ...
          $SPF.newSAXParser(...);

  - id: r3-file-attente-memoire-non-bornee
    languages: [java]
    severity: WARNING
    message: >
      R3/R11 — file d'attente en mémoire sans capacité (LinkedBlockingQueue
      sans argument = Integer.MAX_VALUE). Tout tampon non borné finit par
      faire tomber un pod ; le tampon inter-étapes, c'est Kafka (R11), pas
      une file en heap. Donner une capacité explicite (et une politique de
      rejet) ou supprimer la file.
    metadata:
      regle: R3, R11
      reference: design-rules.md#r3
    pattern-either:
      - pattern: new LinkedBlockingQueue()
      - pattern: new LinkedBlockingQueue<>()
      - pattern: new LinkedBlockingQueue<$T>()
      - pattern: new LinkedBlockingDeque()
      - pattern: new LinkedBlockingDeque<>()
      - pattern: new LinkedBlockingDeque<$T>()

  - id: r3-threadpool-non-borne
    languages: [java]
    severity: WARNING
    message: >
      R3 — pool de threads non borné (file d'attente illimitée). Tout ce qui
      n'est pas borné finit par faire tomber un pod : dimensionner
      explicitement le pool (capacité de queue, nombre de threads max).
    metadata:
      regle: R3
      reference: design-rules.md#r3
    pattern-either:
      - pattern: java.util.concurrent.Executors.newCachedThreadPool(...)
      - pattern: java.util.concurrent.Executors.newWorkStealingPool(...)
