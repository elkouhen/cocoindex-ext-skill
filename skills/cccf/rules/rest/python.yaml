  - id: cccf.rest.python.call-get
    languages: [python]
    severity: INFO
    message: Appel REST client (GET).
    metadata:
      category: endpoint-inventory
      role: call
      http_method: GET
      framework: requests
    patterns:
      - pattern: requests.get(...)

