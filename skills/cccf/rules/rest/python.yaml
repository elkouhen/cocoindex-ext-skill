rules:
  - id: cccf.rest.python.serve-get
    languages: [python]
    severity: INFO
    message: Route REST exposée (GET).
    metadata:
      category: endpoint-inventory
      role: serve
      http_method: GET
      framework: fastapi
    patterns:
      - pattern-either:
          - pattern: |
              @$APP.get(...)
              def $FUNC(...): ...
          - pattern: |
              @$APP.route(...)
              def $FUNC(...): ...

  - id: cccf.rest.python.serve-post
